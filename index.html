
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>員工旅遊 · 行程方案</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700;900&family=Noto+Sans+TC:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#132229;
    --navy:#0F2027;
    --navy-deep:#0A1720;
    --paper:#F3ECDC;
    --paper-soft:#EFE7D3;
    --amber:#E3A23E;
    --coral:#D6603F;
    --line:#C9BFA0;
    --muted:#6B6155;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(1200px 600px at 15% -10%, #16303B 0%, transparent 60%),
      radial-gradient(1000px 500px at 90% 10%, #17313D 0%, transparent 55%),
      var(--navy-deep);
    color:var(--paper);
    font-family:'Noto Sans TC', sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:56px 24px 80px;position:relative;z-index:1;}

  /* ---- Animated background effects (per-plan theme) ---- */
  .bg-effect{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}

  .snowflake{
    position:absolute;
    top:-5vh;
    background:#fff;
    border-radius:50%;
    opacity:.85;
    animation-name:snowfall;
    animation-timing-function:linear;
    animation-iteration-count:infinite;
    filter:blur(.2px);
  }
  @keyframes snowfall{
    from{ transform:translate(0,0); }
    to{ transform:translate(var(--drift,0px), 115vh); }
  }

  .neon-dot{
    position:absolute;
    bottom:-10vh;
    border-radius:50%;
    filter:blur(7px);
    opacity:0;
    animation-name:neonrise;
    animation-timing-function:ease-in-out;
    animation-iteration-count:infinite;
  }
  @keyframes neonrise{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    12%{ opacity:.65; }
    85%{ opacity:.5; }
    100%{ transform:translateY(-125vh) translateX(var(--drift,0px)); opacity:0; }
  }

  .bg-wave{position:fixed;left:0;bottom:0;width:100%;height:22vh;min-height:140px;z-index:0;pointer-events:none;}
  .bg-wave svg{position:absolute;bottom:0;left:0;width:200%;height:100%;}
  .wave-back{animation:waveMove 16s linear infinite;opacity:.35;}
  .wave-front{animation:waveMove 9s linear infinite reverse;opacity:.55;}
  @keyframes waveMove{ from{ transform:translateX(0); } to{ transform:translateX(-50%); } }

  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:clamp(30px,5.2vw,52px);
    font-weight:600;
    letter-spacing:.08em;
    line-height:1.3;
    color:var(--amber);
    text-transform:uppercase;
    margin:0 0 18px;
    text-align:center;
  }
  h1{
    font-family:'Noto Serif TC', serif;
    font-weight:900;
    font-size:clamp(28px,4.4vw,44px);
    line-height:1.25;
    margin:0 0 10px;
    color:var(--paper);
    text-align:center;
  }
  .sub{
    color:#B9C4C7;
    font-size:15px;
    line-height:1.8;
    max-width:640px;
    margin:0 auto 44px;
    text-align:center;
  }
  .sub b{color:var(--amber);font-weight:700;}

  /* ---- Landing: ticket cards (always single column, scroll down) ---- */
  .tickets{
    display:flex;
    flex-direction:column;
    gap:36px;
    max-width:640px;
    margin:0 auto;
  }

  .ticket{
    position:relative;
    background:var(--paper);
    color:var(--ink);
    border-radius:14px;
    cursor:pointer;
    box-shadow:0 18px 40px rgba(0,0,0,.35);
    transform:rotate(var(--tilt,0deg));
    transition:transform .25s ease, box-shadow .25s ease;
    overflow:hidden;
    border:1px solid #DDD2B4;
    text-align:left;
  }
  .ticket:nth-child(1){--tilt:-1.4deg;}
  .ticket:nth-child(2){--tilt:0.8deg;}
  .ticket:nth-child(3){--tilt:-0.6deg;}
  .ticket:hover{transform:rotate(0deg) translateY(-6px);box-shadow:0 26px 55px rgba(0,0,0,.45);}
  .ticket:focus-visible{outline:3px solid var(--amber);outline-offset:3px;}

  .ticket-top{padding:22px 22px 18px;}
  .plan-code{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:.14em;
    color:var(--muted);
    display:flex;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .plan-code span:last-child{color:var(--coral);font-weight:600;}
  .plan-title{
    font-family:'Noto Serif TC', serif;
    font-weight:700;
    font-size:23px;
    line-height:1.4;
    margin:0 0 8px;
  }
  .plan-dest{
    font-size:13px;
    color:var(--muted);
    margin-bottom:16px;
  }
  .plan-meta{
    display:flex;
    gap:18px;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--ink);
    padding-top:12px;
    border-top:1px dashed var(--line);
  }
  .plan-meta div span{display:block;color:var(--muted);font-size:10px;letter-spacing:.08em;margin-bottom:3px;text-transform:uppercase;}

  .perf{
    position:relative;
    height:0;
    border-top:2px dashed var(--line);
    margin:0 22px;
  }
  .perf::before,.perf::after{
    content:"";
    position:absolute;
    top:-11px;
    width:22px;height:22px;
    background:var(--navy-deep);
    border-radius:50%;
  }
  .perf::before{left:-33px;}
  .perf::after{right:-33px;}

  .ticket-bottom{
    padding:16px 22px 22px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .plan-summary{font-size:12.5px;color:var(--muted);line-height:1.6;max-width:70%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .go{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    font-weight:600;
    color:var(--navy-deep);
    background:var(--amber);
    padding:8px 14px;
    border-radius:6px;
    white-space:nowrap;
  }

  /* ---- Detail view ---- */
  #detail{display:none;}
  .back{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:.1em;
    color:var(--amber);
    background:none;
    border:1px solid rgba(227,162,62,.4);
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    margin-bottom:28px;
  }
  .back:hover{background:rgba(227,162,62,.12);}

  .detail-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:16px;
    border-bottom:1px solid rgba(255,255,255,.14);
    padding-bottom:24px;
    margin-bottom:32px;
  }
  .detail-head .plan-code{color:var(--amber);opacity:.85;}
  .detail-head h2{
    font-family:'Noto Serif TC', serif;
    font-weight:900;
    font-size:clamp(26px,3.6vw,38px);
    margin:6px 0 8px;
    color:var(--paper);
  }
  .detail-meta{
    display:flex;
    gap:26px;
    flex-wrap:wrap;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:#B9C4C7;
  }
  .detail-meta span{display:block;color:var(--amber);font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}

  .day-nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:30px;}
  #dayNavBottom{margin-top:44px;padding-top:28px;border-top:1px solid rgba(255,255,255,.14);}
  .day-btn{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    padding:8px 16px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.2);
    background:transparent;
    color:#B9C4C7;
    cursor:pointer;
  }
  .day-btn.active{background:var(--amber);color:var(--navy-deep);border-color:var(--amber);font-weight:600;}

  .day-panel{display:none;}
  .day-panel.active{display:block;}
  .day-panel h3{
    font-family:'Noto Serif TC', serif;
    font-size:20px;
    margin:0 0 6px;
    color:var(--paper);
  }
  .day-panel .day-sub{color:var(--muted);color:#9FADB1;font-size:13px;margin-bottom:20px;}

  .timeline{border-left:2px solid rgba(227,162,62,.35);padding-left:22px;display:flex;flex-direction:column;gap:22px;}
  .item{position:relative;}
  .item::before{
    content:"";
    position:absolute;
    left:-28px;top:4px;
    width:10px;height:10px;
    border-radius:50%;
    background:var(--amber);
    box-shadow:0 0 0 3px rgba(227,162,62,.2);
  }
  .item .time{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--amber);
    margin-bottom:3px;
  }
  .item .activity{font-size:14.5px;color:var(--paper);line-height:1.6;}
  .item .note{font-size:12.5px;color:#93A0A4;margin-top:3px;}

  .notes-box{
    margin-top:40px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.1);
    border-radius:12px;
    padding:18px 22px;
  }
  .notes-box h4{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:.1em;
    color:var(--amber);
    text-transform:uppercase;
    margin:0 0 10px;
  }
  .notes-box p{font-size:13px;line-height:1.9;color:#B9C4C7;margin:0;}

  .edit-hint{
    margin-top:56px;
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    color:#6D7A7E;
    line-height:1.8;
    border-top:1px dashed rgba(255,255,255,.15);
    padding-top:18px;
  }
</style>
</head>

<div class="bg-effect" id="bgEffect"></div>
<div class="wrap">

  <!-- LANDING -->

  </div>

  <!-- DETAIL -->

    <div class="detail-head">
      <div>
        <p class="plan-code" id="dCode"></p>
        <h2 id="dTitle"></h2>
        <div class="detail-meta">
          <div><span>天數</span><b id="dDays"></b></div>
          <div><span>日期</span><b id="dDate"></b></div>
          <div><span>集合地點</span><b id="dMeet"></b></div>

      </div>
    </div>
    <div class="day-nav" id="dayNav"></div>
    <div id="dayPanels"></div>
    <div class="day-nav" id="dayNavBottom"></div>
    <div class="notes-box">
      <h4>注意事項</h4>
      <p id="dNotes"></p>
    </div>
  </div>

  <p class="edit-hint">＊ 行程請洽 設計組 Tony 王</p>
</div>

const ticketList = document.getElementById('ticketList');
plans.forEach((p, idx) => {
  const el = document.createElement('div');
  el.className = 'ticket';
  el.tabIndex = 0;
  el.innerHTML = `
    <div class="ticket-top">
      <div class="plan-code"><span>${p.code[0]}</span>${p.code[1] ? `<span>${p.code[1]}</span>` : ''}</div>
      <div class="plan-title">${p.title}</div>
      <div class="plan-dest">${p.dest}</div>
      <div class="plan-meta">
        <div><span>天數</span>${p.days}</div>
        <div><span>日期</span>${p.date}</div>
      </div>
    </div>
    <div class="perf"></div>
    <div class="ticket-bottom">
      <div class="plan-summary">${p.summary}</div>
      <div class="go">查看行程 →</div>
    </div>
  `;
  el.addEventListener('click', () => showDetail(idx));
  el.addEventListener('keypress', (e) => { if(e.key === 'Enter') showDetail(idx); });
  ticketList.appendChild(el);
});

function showDetail(idx){
  const p = plans[idx];
  document.getElementById('landing').style.display = 'none';
  document.getElementById('detail').style.display = 'block';
  document.getElementById('dCode').textContent = p.code.filter(Boolean).join('   ·   ');
  document.getElementById('dTitle').textContent = p.title;
  document.getElementById('dDays').textContent = p.days;
  document.getElementById('dDate').textContent = p.date;
  document.getElementById('dMeet').textContent = p.meet;
  document.getElementById('dNotes').textContent = p.notes;
  setTheme(p.theme);

  const dayNav = document.getElementById('dayNav');
  const dayNavBottom = document.getElementById('dayNavBottom');
  const dayPanels = document.getElementById('dayPanels');
  dayNav.innerHTML = '';
  dayNavBottom.innerHTML = '';
  dayPanels.innerHTML = '';

  p.itinerary.forEach((day, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (i===0 ? ' active' : '');
    btn.textContent = day.day;
    btn.onclick = () => switchDay(i);
    dayNav.appendChild(btn);

    const btnBottom = document.createElement('button');
    btnBottom.className = 'day-btn' + (i===0 ? ' active' : '');
    btnBottom.textContent = day.day;
    btnBottom.onclick = () => {
      switchDay(i);
      document.getElementById('dayNav').scrollIntoView({behavior:'smooth', block:'start'});
    };
    dayNavBottom.appendChild(btnBottom);

    const panel = document.createElement('div');
    panel.className = 'day-panel' + (i===0 ? ' active' : '');
    panel.dataset.day = i;
    panel.innerHTML = `
      <h3>${day.day}</h3>
      <p class="day-sub">${day.sub}</p>
      <div class="timeline">
        ${day.items.map(it => `
          <div class="item">
            <div class="time">${it.time}</div>
            <div class="activity">${it.activity}</div>
            ${it.note ? `<div class="note">${it.note}</div>` : ''}
          </div>
        `).join('')}
      </div>
    `;
    dayPanels.appendChild(panel);
  });
  window.scrollTo(0,0);
}

function switchDay(i){
  document.querySelectorAll('.day-btn').forEach((b,idx)=>b.classList.toggle('active', idx===i));
  document.querySelectorAll('.day-panel').forEach(p=>p.classList.toggle('active', Number(p.dataset.day)===i));
}

function showLanding(){
  document.getElementById('detail').style.display = 'none';
  document.getElementById('landing').style.display = 'block';
  document.getElementById('bgEffect').innerHTML = '';
  window.scrollTo(0,0);
}

function setTheme(theme){
  const bg = document.getElementById('bgEffect');
  bg.innerHTML = '';

  if (theme === 'snow') {
    for (let i = 0; i < 45; i++) {
      const f = document.createElement('div');
      f.className = 'snowflake';
      const size = 3 + Math.random() * 6;
      const left = Math.random() * 100;
      const duration = 8 + Math.random() * 10;
      const delay = -Math.random() * 18;
      const drift = (Math.random() * 80 - 40) + 'px';
      f.style.width = f.style.height = size + 'px';
      f.style.left = left + 'vw';
      f.style.animationDuration = duration + 's';
      f.style.animationDelay = delay + 's';
      f.style.setProperty('--drift', drift);
      bg.appendChild(f);
    }
  } else if (theme === 'neon') {
    const colors = ['#E3A23E','#D6603F','#F3ECDC','#E9CD94'];
    for (let i = 0; i < 28; i++) {
      const d = document.createElement('div');
      d.className = 'neon-dot';
      const size = 6 + Math.random() * 16;
      const left = Math.random() * 100;
      const duration = 7 + Math.random() * 9;
      const delay = -Math.random() * 14;
      const drift = (Math.random() * 60 - 30) + 'px';
      d.style.width = d.style.height = size + 'px';
      d.style.left = left + 'vw';
      d.style.background = colors[i % colors.length];
      d.style.animationDuration = duration + 's';
      d.style.animationDelay = delay + 's';
      d.style.setProperty('--drift', drift);
      bg.appendChild(d);
    }
  } else if (theme === 'wave') {
    bg.innerHTML = `
      <div class="bg-wave">
        <svg viewBox="0 0 200 40" preserveAspectRatio="none" class="wave-back">
          <path d="M0,20 C25,35 50,5 75,20 C100,35 125,5 150,20 C175,35 187,20 200,20 L200,40 L0,40 Z" fill="#2A6F6F"/>
        </svg>
        <svg viewBox="0 0 200 40" preserveAspectRatio="none" class="wave-front">
          <path d="M0,22 C25,8 50,32 75,18 C100,4 125,30 150,16 C175,4 187,18 200,18 L200,40 L0,40 Z" fill="#E3A23E"/>
        </svg>
      </div>
    `;
  }
}
